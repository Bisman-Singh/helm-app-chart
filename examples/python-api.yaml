# Example: Python FastAPI application with configmap, probes, and resource limits
# Usage: helm install my-python-api ./app-chart -f examples/python-api.yaml

replicaCount: 3

image:
  repository: registry.example.com/acme/fastapi-service
  tag: "1.5.0"
  pullPolicy: IfNotPresent

fullnameOverride: fastapi-service

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

configmap:
  enabled: true
  data:
    APP_NAME: "FastAPI Service"
    WORKERS: "4"
    LOG_FORMAT: "json"
    CORS_ORIGINS: "https://app.example.com,https://admin.example.com"
    CACHE_TTL: "300"

# Secrets should be created externally (e.g., via External Secrets Operator, Sealed Secrets, or kubectl)
# Then referenced here via env or envFrom
secret:
  enabled: false

env:
  - name: DATABASE_URL
    valueFrom:
      secretKeyRef:
        name: fastapi-db-credentials
        key: url
  - name: REDIS_URL
    valueFrom:
      secretKeyRef:
        name: fastapi-redis-credentials
        key: url
  - name: JWT_SECRET
    valueFrom:
      secretKeyRef:
        name: fastapi-auth
        key: jwt-secret

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 1Gi

livenessProbe:
  httpGet:
    path: /api/v1/health
    port: http
  initialDelaySeconds: 20
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /api/v1/health/ready
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /api/v1/health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 60

initContainers:
  - name: run-migrations
    image: registry.example.com/acme/fastapi-service:1.5.0
    command: ["python", "-m", "alembic", "upgrade", "head"]
    envFrom:
      - secretRef:
          name: fastapi-service

volumes:
  - name: tmp
    emptyDir: {}
  - name: cache
    emptyDir:
      sizeLimit: 256Mi

volumeMounts:
  - name: tmp
    mountPath: /tmp
  - name: cache
    mountPath: /app/.cache

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - fastapi-service
          topologyKey: kubernetes.io/hostname

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8000"
  prometheus.io/path: "/metrics"

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

terminationGracePeriodSeconds: 45
